# WORKFLOW-config.yaml — IDC contract sidecar (lives at the governed repo root).
#
# Hard requirement: project.name. Everything else is optional/recommended.
# Tracker field IDs live exclusively in docs/workflow/tracker-config.yaml.
#
# Template tokens are written as quoted strings so this file stays valid YAML;
# `/idc:init` replaces each token with the concrete value.
workflow:
  schema: idc
  version: 2

project:
  name: "{{PROJECT_NAME}}"

# Requirements-gate toggles — which canonical "requirements" layer change pauses for the one human
# gate (the operator-approval issue). The PRD (user-facing *what*) always gates; the TRD (the
# technical *how* — the `spec` layer) gates only where the repo opts in. `/idc:init` sets the TRD
# default by repo type: greenfield leaves it off, brownfield flips it on. Read by the gate predicate
# (`scripts/idc_recirculator_layers.py`); Plan and the Recirculator honor it.
gating:
  prd: on    # PRD changes always gate (user-facing product function)
  trd: off   # TRD/spec changes gate only when on (greenfield default: off)

# Pathway enforcement profiles.
# IDC names three `pathway_enforcement.mode` profiles: `off | controlled | app-locked`.
# `controlled` blocks supported-runtime off-path mutations and blocks merge when pathway evidence is missing or inconsistent, but it cannot stop a machine administrator from removing hooks, editing `.git`, or disabling GitHub rules.
# `app-locked` adds a GitHub App as the sole tracker writer and trusted check source; it closes the ordinary-token tracker-write gap but still does not protect against repository or organization administrators removing the rules or the App.
# The filesystem tracker remains useful for hermetic tests and local demonstrations. It must stay `off` and makes no hard pathway-security claim.
# This scaffold keeps the profile explicit but non-enforcing until backend-aware default enablement lands.
pathway_enforcement:
  mode: off          # off | controlled | app-locked
  attempt_ceiling: 3

# Canonical document map for the IDC roles (v2 — five-layer chain + lean process tree).
documents:
  workflow: WORKFLOW.md
  tracker_config: docs/workflow/tracker-config.yaml
  prd: docs/prd/
  specs: docs/specs/
  plans: docs/plans/
  considerations: docs/considerations/
  pillar_matrices: docs/workflow/pillar-matrices/
  code_reviews: docs/workflow/code-reviews/

# Autorun staffing gate. Autorun drains the whole repo autonomously with NO mid-drain asks. The
# one launch-time exception: when the staffing estimate (the sous chefs the full drain will spawn)
# EXCEEDS this threshold, Autorun surfaces exactly one "~N sous chefs / ~M subagents across K
# windows — go / scope down?" cost confirmation before draining; at or below it there is no gate at
# all. The estimate never makes Autorun self-narrow to a phase — phase-scoping is the operator's
# explicit `/idc:build --phase N` choice. Read by the autorun parent (`agents/idc-autorun.md`).
autorun:
  staffing_gate_threshold: 10   # sous chefs; > this ⇒ one launch-time cost gate, else fully autonomous

# Janitor auto-safe knob — the ONE opt-in exception to autorun's report-only janitor preflight
# (`agents/idc-autorun.md`, `commands/autorun.md`): absent by default (report-only; a misspelled
# or malformed value also fails safe to report-only, never a silent auto-apply). When set exactly
# to `auto-safe`, autorun's one-time janitor preflight passes `--apply-safe` to idc_git_janitor.py
# instead of `--report` — SAFE-FIX tier only; RISKY and REPORT-ONLY are never auto-applied even
# with this set. Absent (commented out) by default:
# janitor: auto-safe

# Live-product verification — the ONE thing IDC cannot infer about your project.
#
# Every other IDC gate verifies CODE: unit and contract tests, the review dimensions, the
# architectural fences, each issue's own verification surface. All of them can be green while the
# DEPLOYED product is broken, because what usually breaks a deployment is not in the reviewed diff at
# all — a bucket nobody created, an env var nobody set, an IAM role granted by hand. That is how a
# phase ships "100% merged, every gate green" and still cannot serve a single user.
#
# IDC cannot know how to deploy or drive YOUR product, and hardcoding a browser, an HTTP client or a
# cloud SDK here would be wrong for the next repo. So YOU supply the command and IDC runs it: each
# surface names a `verify:` shell command that drives the REAL deployed thing and exits 0 only if it
# genuinely worked. At wave close IDC EXECUTES that command and writes a machine-generated receipt —
# the command, its exit code, the commit it ran against, when, and a bounded excerpt of the output.
# Nobody is asked to type "I tested it", and nobody is woken up to go and look.
#
# THE VERIFY SCRIPT IS BUILD WORK — THE AGENT WRITES IT. `scripts/verify-live-<surface>.sh` is written
# by whoever implements the surface, exactly like its tests: authenticated HTTP calls against the
# deployed endpoints, a browser driver, a CLI probe, whatever actually exercises the journey. It is
# never an errand for the operator. Make it exit non-zero on any failed step, print what it saw, and
# terminate on its own (it runs with no stdin under a timeout).
#
# NEVER PRINT A SECRET. Your script will hold real credentials. IDC redacts what it captures before
# writing anything, but redaction is a backstop, not a licence: do not echo tokens, headers, signed
# URLs, or the environment. The evidence record is COMMITTED.
#
# The evidence EXPIRES BY ITSELF the moment anything lands on the paths behind it. That expiry is the
# point: it is what makes a Terraform change invalidate yesterday's passing run, so provisioning drift
# cannot hide behind a green build. Changing the `verify:` command expires it too.
#
# EMPTY BY DEFAULT AND FREE. `surfaces: []` means this repo has no deployed surface to drive — a
# library, a CLI, a plugin — and the gate reports `live: not-declared`, executes nothing, and costs you
# nothing. Opting in is the only way to be gated. Read by `scripts/idc_live_check.py`, which
# `/idc:build`'s wave close RUNS (`--run`) and `/idc:autorun`'s drain AUDITS.
#
# Each surface takes:
#   name      (required) the surface's short name.
#   verify    (required) the shell command that drives the real deployment, run from the repo root.
#             Exit 0 = it genuinely worked. Required unless `attested: true`.
#   paths     (required) the code+infra paths whose changes invalidate the evidence. Include the
#             INFRASTRUCTURE paths (terraform/, deploy scripts) — that is what closes the provisioning
#             hole. A flow list `[a, b]` or a comma-separated value; a block list is not read.
#   journey   (recommended) plain-English steps the verify script must cover. Never interpreted.
#   evidence  (optional) the record's path. Default: docs/workflow/live-verification/<name>.md
#   timeout   (optional) seconds the command may take. Default 600. Overrunning is INDETERMINATE.
#   attested  (optional) `true` ONLY for a surface that genuinely cannot be automated (a physical
#             device, a third-party console). It replaces `verify:` with a hand-written record, and the
#             verdict then reads `live: ok (attested)` so a typed claim can never be mistaken for a
#             real run. Declaring both `verify:` and `attested: true` is refused.
#
# The evidence record is generated for you — do not hand-write it. `--run` overwrites it every time,
# on failure as well as success, so the file always describes the LAST real execution. Hand-writing it
# does not work: `--run` also records each execution inside the repo's git directory (which git never
# carries), and the audit refuses a receipt no local run backs, reporting `live: gap`. The same rule
# means a fresh clone must run the check once before its committed receipt is trusted there.
#
# `evidence:` must resolve INSIDE the repo. The writer creates parent directories and truncates the
# target, and a receipt written outside the repo would never be committed while still reading clean.
live_verification:
  surfaces: []
  # Delete the `[]` above first, then uncomment — a list can't follow a same-line empty `[]`.
  # - name: web
  #   verify: bash scripts/verify-live-web.sh
  #   journey: sign in -> ingest text -> open the item -> chat
  #   paths: [services/, web/, infra/]
  #   evidence: docs/workflow/live-verification/web.md
  #   timeout: 600

# Standing domains for this repo — config-seeded at `/idc:init` from codebase analysis,
# pruned to touched domains and ad-hoc-extended by each `/idc:plan` run, maintained by
# the Recirculator. Each entry: a single-select Domain value, a one-line brief, and primary
# surfaces. Empty until `/idc:init` populates it.
domains: []
  # Manual population (skipping /idc:init's derivation): delete the `[]` above first, then
  # uncomment — a list can't follow a same-line empty `[]`.
  # - name: api
  #   brief: HTTP surface + request handlers
  #   surfaces: [src/api/, src/handlers/]
  # - name: data
  #   brief: persistence + migrations
  #   surfaces: [src/db/, migrations/]

# Tier-symbolic model routing. Process docs (commands/agents/skills) reference ONLY the
# tier name; the runtime adapter resolves a tier to a concrete model HERE at spawn time.
# The Recirculator updates this table when models change. The Codex runtime ignores tiers entirely
# (untiered: highest available model at highest reasoning effort for every role).
#
# Model-escalation ladder (user's standing principle): deterministic wherever possible (rung 0 —
# no model at all; the mechanical plumbing itself — atomic close, idc_git_finish.py's end-state
# verify, idc_provenance_check.py, idc_emit_marker.py's serialization, an idc_gh_board.py board
# read — runs as a script call, never a tier lookup) -> latest Sonnet for easy/mechanical work ->
# Opus when something looks risky or questionable -> Fable only when truly stuck -> the human
# last, as an information source ("what do you know that the board doesn't"), never a
# rubber-stamp judge. Per-role overrides (`overrides:` below) mirror the pi runtime's
# PI_IDC_<ROLE>_MODEL / PI_IDC_MODEL per-role-then-umbrella precedence
# (skills/idc-adapter-pi/SKILL.md) so all three runtimes stay in parity.
model_routing:
  utility:
    claude: { model: "claude-sonnet-4-6" }
    use: >-
      execute-never-decide: research digestion, repo reconnaissance, templated emission from
      up-tier content, board mechanics, the schema check, the inventory review dimensions.
      The default for the LLM roles that orchestrate the deterministic plumbing above: tracker
      ops, janitor triage, marker emission, board reads.
  standard:
    claude: { model: "claude-opus-4-8", effort: extra-high }
    use: >-
      think/interview; build implementers (goal loops); the finisher/orchestrator; the
      autorun parent. Also the risk-flagged escalation target: a RISKY janitor-tier finding, a
      recirc consultant on a cascade, and review escalations route here.
  reasoning:
    claude: { model: "claude-fable-5", thinking: max }
    use: >-
      planning cognition; the review coordinator/verdict + all judgment review dimensions;
      recirculator layer-impact analysis + PRD diffs; clash/matrix + sequencing; merge
      deconfliction. Reserved for genuinely stuck-state escalation (e.g. a recirc consultant
      whose cascade analysis stalls at the Opus tier), never a blanket default.
  codex:
    untiered: true
    note: highest available Codex model at highest reasoning effort for every role
  overrides:
    # Per-role tier pin for a single repo/role, mirroring the pi runtime's
    # PI_IDC_<ROLE>_MODEL / PI_IDC_MODEL precedence (per-role > umbrella > stock default;
    # skills/idc-adapter-pi/SKILL.md). Empty by default. Example:
    #   janitor_triage: standard   # escalate this repo's janitor triage to Opus
