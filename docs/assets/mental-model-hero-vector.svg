<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img"
     aria-label="The IDC water rig: ideas leave the Think Tank through ONE drain carrying an inline Diverter #1 — the one gate — which either holds the flow as the locked PRD + TRD (you authorize by merging the Think PR) or admits it down the pipe. Admitted work crosses two planning grid-plates (domain x phase/wave) and the matrix-analysis filter, then the labeled Sequencing Manifold junction fans the single pipe into four parallel wave-pipes — each running the build triplet inline (implementer turbine, review filter, finisher turbine) with its own red/green status light at the head — before the pipes reform and reach Diverter #2 (ship or return): clean water pours out the Autorun faucet (with its on/off handle) into the glass, while not-good work takes the Recirculator all the way back to Diverter #1. A dashboard reads a sensor on every component and the light on every wave.">
  <!-- Coal House palette: coal #252427, canvas #F9FAFD, sage #9CA689, coral #F56A6A, deep #1b1a1c -->
  <defs>
    <symbol id="turbine" viewBox="-40 -40 80 80">
      <circle r="33" fill="#252427" stroke="#F9FAFD" stroke-width="3.5"/>
      <g stroke="#F9FAFD" stroke-width="2.5">
        <line x1="0" y1="-33" x2="0" y2="33"/>
        <line x1="-33" y1="0" x2="33" y2="0"/>
        <line x1="-23.3" y1="-23.3" x2="23.3" y2="23.3"/>
        <line x1="-23.3" y1="23.3" x2="23.3" y2="-23.3"/>
      </g>
      <circle r="8" fill="#9CA689" stroke="#252427" stroke-width="1.5"/>
      <circle r="33" fill="none" stroke="#9CA689" stroke-width="2" stroke-dasharray="2 6" opacity="0.7"/>
    </symbol>
    <clipPath id="frame"><rect x="0" y="0" width="1600" height="820"/></clipPath>
  </defs>

  <g clip-path="url(#frame)" font-family="Gill Sans, Gill Sans MT, Futura, Trebuchet MS, sans-serif">
    <!-- canvas + frame -->
    <rect width="1600" height="820" fill="#252427"/>
    <rect x="20.5" y="20.5" width="1559" height="779" fill="none" stroke="#9CA689" stroke-opacity="0.35" stroke-width="1"/>

    <!-- corner captions -->
    <text x="44" y="52" font-size="13" letter-spacing="3" fill="#9CA689" fill-opacity="0.9">THE IDC WATER RIG</text>
    <text x="44" y="76" font-size="20" font-weight="bold" letter-spacing="0.5" fill="#F9FAFD">An idea in. Working software out.</text>
    <text x="1556" y="792" text-anchor="end" font-size="12.5" letter-spacing="2.5" fill="#9CA689" fill-opacity="0.85">ONE-WAY FLOW · ONE GATE · ONE WAY BACK</text>

    <!-- ===================== LEFT TRUNK PIPE (tank → manifold) ===================== -->
    <rect x="213" y="408" width="333" height="24" fill="#9CA689" fill-opacity="0.10"/>
    <line x1="213" y1="408" x2="546" y2="408" stroke="#F9FAFD" stroke-width="2.5"/>
    <line x1="213" y1="432" x2="546" y2="432" stroke="#F9FAFD" stroke-width="2.5"/>
    <g fill="#9CA689">
      <path d="M330,420 l-10,-6 l0,12 z"/>
      <path d="M522,420 l-10,-6 l0,12 z"/>
    </g>

    <!-- ===================== THINK TANK (one drain) ===================== -->
    <g>
      <ellipse cx="135" cy="238" rx="80" ry="16" fill="#252427" stroke="#F9FAFD" stroke-width="3"/>
      <rect x="55" y="238" width="160" height="300" rx="10" fill="#252427" stroke="#F9FAFD" stroke-width="3"/>
      <line x1="55" y1="238" x2="55" y2="538" stroke="#F9FAFD" stroke-width="3"/>
      <line x1="215" y1="238" x2="215" y2="538" stroke="#F9FAFD" stroke-width="3"/>
      <ellipse cx="135" cy="538" rx="80" ry="16" fill="#252427" stroke="#F9FAFD" stroke-width="3"/>
      <!-- rivets -->
      <g fill="#9CA689">
        <circle cx="69" cy="285" r="2.6"/><circle cx="69" cy="345" r="2.6"/><circle cx="69" cy="405" r="2.6"/><circle cx="69" cy="465" r="2.6"/><circle cx="69" cy="510" r="2.6"/>
        <circle cx="201" cy="285" r="2.6"/><circle cx="201" cy="345" r="2.6"/><circle cx="201" cy="510" r="2.6"/>
      </g>
      <!-- floating ideas (bubbles) -->
      <g fill="#9CA689" fill-opacity="0.55" stroke="#9CA689" stroke-opacity="0.8">
        <circle cx="110" cy="315" r="13"/>
        <circle cx="162" cy="360" r="9"/>
        <circle cx="102" cy="405" r="10"/>
        <circle cx="158" cy="445" r="14"/>
        <circle cx="122" cy="488" r="8"/>
        <circle cx="92" cy="462" r="6"/>
      </g>
      <!-- the ONE drain: tank → inline diverter -->
      <path d="M215,420 L240,420" stroke="#F9FAFD" stroke-width="3"/>
    </g>
    <text x="135" y="588" text-anchor="middle" font-size="18" font-weight="bold" letter-spacing="2" fill="#F9FAFD">THINK TANK</text>
    <text x="135" y="609" text-anchor="middle" font-size="12.5" fill="#9CA689" letter-spacing="0.5">/idc:think · ideas float free</text>
    <text x="135" y="627" text-anchor="middle" font-size="12.5" fill="#9CA689" letter-spacing="0.5">one drain out → the gate</text>

    <!-- ===================== DIVERTER #1 — the one gate, inline on the drain ===================== -->
    <!-- gated port (up): the locked PRD + TRD documents -->
    <line x1="262" y1="406" x2="262" y2="356" stroke="#F56A6A" stroke-width="2.5"/>
    <!-- two document pages (PRD, TRD) -->
    <g stroke="#F9FAFD" stroke-width="2" fill="#252427">
      <path d="M236,312 l22,0 l8,8 l0,30 l-30,0 z"/>
      <path d="M258,312 l-0.1,8 l8,0"/>
      <path d="M270,322 l22,0 l8,8 l0,30 l-30,0 z"/>
      <path d="M292,322 l-0.1,8 l8,0"/>
    </g>
    <g stroke="#9CA689" stroke-width="1.2" stroke-opacity="0.8">
      <line x1="241" y1="326" x2="258" y2="326"/><line x1="241" y1="334" x2="258" y2="334"/><line x1="241" y1="342" x2="252" y2="342"/>
      <line x1="275" y1="336" x2="292" y2="336"/><line x1="275" y1="344" x2="292" y2="344"/>
    </g>
    <!-- padlock on the gated port -->
    <path d="M255,356 a7,7 0 0 1 14,0" fill="none" stroke="#F56A6A" stroke-width="2.5"/>
    <rect x="250" y="356" width="24" height="20" rx="3" fill="#252427" stroke="#F56A6A" stroke-width="2.5"/>
    <circle cx="262" cy="364" r="2.4" fill="#F56A6A"/>
    <!-- the inline diverter valve (bow-tie on the drain) -->
    <g transform="translate(270,420)">
      <path d="M0,0 L-14,-12 L-14,12 z" fill="#252427" stroke="#F56A6A" stroke-width="3"/>
      <path d="M0,0 L14,-12 L14,12 z" fill="#252427" stroke="#F56A6A" stroke-width="3"/>
      <circle r="4.5" fill="#F56A6A"/>
    </g>
    <text x="335" y="248" text-anchor="middle" font-size="15" font-weight="bold" letter-spacing="0.5" fill="#F56A6A">DIVERTER #1 — THE ONE GATE</text>
    <text x="335" y="265" text-anchor="middle" font-size="11.5" fill="#F56A6A" fill-opacity="0.95">inline on the one drain · the Think PR</text>
    <text x="335" y="281" text-anchor="middle" font-size="11" fill="#9CA689">→ PRD + TRD (locked), or admit by merging</text>

    <!-- ===================== PLANNING — two grid-plates → matrix-analysis filter ===================== -->
    <!-- grid-plate #1: DOMAIN (horizontal plate) -->
    <rect x="338" y="404" width="50" height="32" rx="3" fill="#252427" stroke="#F9FAFD" stroke-width="2.5"/>
    <g stroke="#9CA689" stroke-width="1.2" stroke-opacity="0.85">
      <line x1="338" y1="414.7" x2="388" y2="414.7"/>
      <line x1="338" y1="425.3" x2="388" y2="425.3"/>
    </g>
    <!-- grid-plate #2: PHASE/WAVE (vertical plate) -->
    <rect x="402" y="392" width="32" height="56" rx="3" fill="#252427" stroke="#F9FAFD" stroke-width="2.5"/>
    <g stroke="#9CA689" stroke-width="1.2" stroke-opacity="0.85">
      <line x1="412.7" y1="392" x2="412.7" y2="448"/>
      <line x1="423.3" y1="392" x2="423.3" y2="448"/>
    </g>
    <text x="386" y="368" text-anchor="middle" font-size="13.5" font-weight="bold" letter-spacing="0.5" fill="#F9FAFD">PLANNING · /idc:plan</text>
    <text x="386" y="384" text-anchor="middle" font-size="11" fill="#9CA689">grid-plates: domain × phase/wave</text>

    <!-- matrix-analysis filter -->
    <rect x="470" y="398" width="46" height="44" rx="6" fill="#252427" stroke="#F9FAFD" stroke-width="2.5"/>
    <g fill="none" stroke="#9CA689" stroke-width="2.2">
      <path d="M478,408 l9,12 l-9,12"/>
      <path d="M492,408 l9,12 l-9,12"/>
    </g>
    <text x="493" y="470" text-anchor="middle" font-size="12.5" font-weight="bold" letter-spacing="0.5" fill="#F9FAFD">MATRIX-ANALYSIS</text>
    <text x="493" y="485" text-anchor="middle" font-size="12.5" font-weight="bold" letter-spacing="0.5" fill="#F9FAFD">FILTER</text>
    <text x="493" y="500" text-anchor="middle" font-size="10.5" fill="#9CA689">deconflict → buildable issues</text>

    <!-- ===================== SEQUENCING MANIFOLD — fan into 4 parallel wave-pipes ===================== -->
    <text x="867" y="250" text-anchor="middle" font-size="16" font-weight="bold" letter-spacing="1.5" fill="#F9FAFD">PARALLEL WAVE-PIPES — THE BUILD</text>
    <text x="867" y="618" text-anchor="middle" font-size="12" fill="#9CA689">each wave runs the build triplet inline:  ⊙ implementer turbine  →  ▒ review filter  →  ⊙ finisher turbine</text>
    <text x="867" y="636" text-anchor="middle" font-size="12" fill="#9CA689">a status light at the head of every wave — <tspan fill="#F56A6A">red</tspan> / <tspan fill="#9CA689">green</tspan> · the matrix gives each pipe its own files, so streams never cross</text>

    <!-- SEQUENCING MANIFOLD — the labeled junction/header where the single pipe fans into the wave-pipes -->
    <rect x="546" y="300" width="33" height="240" rx="9" fill="#252427" stroke="#F9FAFD" stroke-width="3"/>
    <rect x="546" y="300" width="33" height="240" rx="9" fill="#9CA689" fill-opacity="0.08" stroke="none"/>
    <!-- inlet from the trunk -->
    <rect x="538" y="412" width="9" height="16" rx="2" fill="#252427" stroke="#F9FAFD" stroke-width="2"/>
    <!-- four outlet ports feeding the wave-pipes -->
    <g stroke="#F9FAFD" stroke-width="2" fill="#252427">
      <rect x="579" y="309" width="8" height="12" rx="2"/>
      <rect x="579" y="379" width="8" height="12" rx="2"/>
      <rect x="579" y="449" width="8" height="12" rx="2"/>
      <rect x="579" y="519" width="8" height="12" rx="2"/>
    </g>
    <text x="562" y="562" text-anchor="middle" font-size="11.5" font-weight="bold" letter-spacing="0.5" fill="#9CA689">SEQUENCING</text>
    <text x="562" y="576" text-anchor="middle" font-size="11.5" font-weight="bold" letter-spacing="0.5" fill="#9CA689">MANIFOLD</text>

    <!-- vein fan-in (4 wave-pipes → single pipe) -->
    <g fill="none" stroke="#F9FAFD" stroke-width="2" stroke-opacity="0.9">
      <path d="M1118,315 C1146,315 1144,420 1176,420"/>
      <path d="M1118,385 C1146,385 1146,420 1176,420"/>
      <path d="M1118,455 C1146,455 1146,420 1176,420"/>
      <path d="M1118,525 C1146,525 1144,420 1176,420"/>
    </g>

    <!-- LANE 0 (y=315) green -->
    <line x1="586" y1="315" x2="1118" y2="315" stroke="#F9FAFD" stroke-width="2" stroke-opacity="0.85"/>
    <use href="#turbine" x="663" y="300" width="30" height="30"/>
    <rect x="810" y="300" width="20" height="30" rx="3" fill="#252427" stroke="#F9FAFD" stroke-width="2"/>
    <path d="M814,308 l6,7 l-6,7" fill="none" stroke="#9CA689" stroke-width="1.6"/>
    <use href="#turbine" x="940" y="300" width="30" height="30"/>
    <path d="M1052,315 l-9,-5 l0,10 z" fill="#9CA689"/>
    <circle cx="620" cy="315" r="6.5" fill="#9CA689"/><circle cx="620" cy="315" r="10.5" fill="none" stroke="#9CA689" stroke-opacity="0.4" stroke-width="2"/>

    <!-- LANE 1 (y=385) red -->
    <line x1="586" y1="385" x2="1118" y2="385" stroke="#F9FAFD" stroke-width="2" stroke-opacity="0.85"/>
    <use href="#turbine" x="663" y="370" width="30" height="30"/>
    <rect x="810" y="370" width="20" height="30" rx="3" fill="#252427" stroke="#F9FAFD" stroke-width="2"/>
    <path d="M814,378 l6,7 l-6,7" fill="none" stroke="#9CA689" stroke-width="1.6"/>
    <use href="#turbine" x="940" y="370" width="30" height="30"/>
    <path d="M1052,385 l-9,-5 l0,10 z" fill="#9CA689"/>
    <circle cx="620" cy="385" r="6.5" fill="#F56A6A"/><circle cx="620" cy="385" r="10.5" fill="none" stroke="#F56A6A" stroke-opacity="0.4" stroke-width="2"/>

    <!-- LANE 2 (y=455) green -->
    <line x1="586" y1="455" x2="1118" y2="455" stroke="#F9FAFD" stroke-width="2" stroke-opacity="0.85"/>
    <use href="#turbine" x="663" y="440" width="30" height="30"/>
    <rect x="810" y="440" width="20" height="30" rx="3" fill="#252427" stroke="#F9FAFD" stroke-width="2"/>
    <path d="M814,448 l6,7 l-6,7" fill="none" stroke="#9CA689" stroke-width="1.6"/>
    <use href="#turbine" x="940" y="440" width="30" height="30"/>
    <path d="M1052,455 l-9,-5 l0,10 z" fill="#9CA689"/>
    <circle cx="620" cy="455" r="6.5" fill="#9CA689"/><circle cx="620" cy="455" r="10.5" fill="none" stroke="#9CA689" stroke-opacity="0.4" stroke-width="2"/>

    <!-- LANE 3 (y=525) red -->
    <line x1="586" y1="525" x2="1118" y2="525" stroke="#F9FAFD" stroke-width="2" stroke-opacity="0.85"/>
    <use href="#turbine" x="663" y="510" width="30" height="30"/>
    <rect x="810" y="510" width="20" height="30" rx="3" fill="#252427" stroke="#F9FAFD" stroke-width="2"/>
    <path d="M814,518 l6,7 l-6,7" fill="none" stroke="#9CA689" stroke-width="1.6"/>
    <use href="#turbine" x="940" y="510" width="30" height="30"/>
    <path d="M1052,525 l-9,-5 l0,10 z" fill="#9CA689"/>
    <circle cx="620" cy="525" r="6.5" fill="#F56A6A"/><circle cx="620" cy="525" r="10.5" fill="none" stroke="#F56A6A" stroke-opacity="0.4" stroke-width="2"/>

    <!-- triplet annotation on lane 0 -->
    <text x="612" y="288" text-anchor="middle" font-size="9.5" fill="#9CA689" fill-opacity="0.85">wave light</text>
    <text x="678" y="288" text-anchor="middle" font-size="9.5" fill="#9CA689" fill-opacity="0.85">implementer</text>
    <text x="820" y="288" text-anchor="middle" font-size="9.5" fill="#9CA689" fill-opacity="0.85">filter</text>
    <text x="955" y="288" text-anchor="middle" font-size="9.5" fill="#9CA689" fill-opacity="0.85">finisher</text>

    <!-- ===================== VEIN TRUNK → DIVERTER #2 ===================== -->
    <rect x="1176" y="408" width="78" height="24" fill="#9CA689" fill-opacity="0.10"/>
    <line x1="1176" y1="408" x2="1290" y2="408" stroke="#F9FAFD" stroke-width="2.5"/>
    <line x1="1176" y1="432" x2="1290" y2="432" stroke="#F9FAFD" stroke-width="2.5"/>
    <path d="M1216,420 l-10,-6 l0,12 z" fill="#9CA689"/>
    <!-- diverter #2 (bow-tie): ship or return -->
    <g transform="translate(1254,420)">
      <path d="M0,0 L-13,-11 L-13,11 z" fill="#252427" stroke="#F56A6A" stroke-width="3"/>
      <path d="M0,0 L13,-11 L13,11 z" fill="#252427" stroke="#F56A6A" stroke-width="3"/>
      <circle r="4" fill="#F56A6A"/>
    </g>
    <text x="1254" y="386" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="0.5" fill="#F56A6A">DIVERTER #2</text>
    <text x="1254" y="402" text-anchor="middle" font-size="11" fill="#F56A6A">ship or return</text>

    <!-- ===================== FAUCET (with ON/OFF handle) + GLASS ===================== -->
    <!-- riser + gooseneck -->
    <path d="M1268,420 L1320,420 L1320,330 Q1320,304 1346,304 L1430,304 Q1456,304 1456,330 L1456,372"
          fill="none" stroke="#F9FAFD" stroke-width="5"/>
    <!-- ON/OFF handle on the riser -->
    <g>
      <circle cx="1320" cy="386" r="6" fill="#252427" stroke="#9CA689" stroke-width="2"/>
      <line x1="1320" y1="386" x2="1352" y2="372" stroke="#9CA689" stroke-width="4" stroke-linecap="round"/>
      <circle cx="1352" cy="372" r="4" fill="#9CA689"/>
    </g>
    <text x="1300" y="392" text-anchor="end" font-size="11" font-weight="bold" letter-spacing="1" fill="#9CA689">ON</text>
    <text x="1364" y="362" text-anchor="start" font-size="11" letter-spacing="1" fill="#9CA689" fill-opacity="0.7">off</text>
    <!-- pour -->
    <path d="M1456,372 q-6,28 0,56 q6,26 0,50" fill="none" stroke="#9CA689" stroke-width="3.5" opacity="0.85"/>
    <!-- glass -->
    <path d="M1423,452 L1489,452 L1481,584 L1431,584 z" fill="none" stroke="#F9FAFD" stroke-width="3"/>
    <path d="M1427,506 L1485,506 L1481,584 L1431,584 z" fill="#9CA689" fill-opacity="0.35" stroke="none"/>
    <text x="1388" y="276" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#F9FAFD">FAUCET</text>
    <text x="1388" y="292" text-anchor="middle" font-size="11" fill="#9CA689">/idc:autorun — the on/off handle</text>
    <text x="1388" y="307" text-anchor="middle" font-size="11" fill="#9CA689">open it and the rig runs itself</text>
    <text x="1456" y="616" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#F9FAFD">THE GLASS</text>
    <text x="1456" y="632" text-anchor="middle" font-size="11" fill="#9CA689">the software you consume</text>

    <!-- ===================== RECIRCULATOR — the only way back ===================== -->
    <path d="M1254,434 L1254,732 L262,732 L262,434" fill="none" stroke="#F56A6A" stroke-width="3"/>
    <g fill="#F56A6A">
      <path d="M880,732 l11,-6 l0,12 z"/>
      <path d="M620,732 l11,-6 l0,12 z"/>
      <path d="M420,732 l11,-6 l0,12 z"/>
      <path d="M262,470 l-6,11 l12,0 z" transform="rotate(180 262 475)"/>
    </g>
    <text x="770" y="758" text-anchor="middle" font-size="13" font-weight="bold" letter-spacing="1.5" fill="#F56A6A">THE RECIRCULATOR — /idc:recirculate</text>
    <text x="770" y="776" text-anchor="middle" font-size="11.5" fill="#F56A6A" fill-opacity="0.9">the only way back — carries it all the way to Diverter #1 (re-plan, or up to the PRD + TRD)</text>

    <!-- ===================== DASHBOARD + SENSORS ===================== -->
    <text x="855" y="52" text-anchor="middle" font-size="16" font-weight="bold" letter-spacing="2" fill="#F9FAFD">THE DASHBOARD — THE BOARD</text>
    <rect x="640" y="66" width="430" height="118" rx="10" fill="#1b1a1c" stroke="#F9FAFD" stroke-width="2"/>
    <text x="855" y="90" text-anchor="middle" font-size="10.5" letter-spacing="2" fill="#9CA689">STATUS · STAGE · WAVE · PHASE · DOMAIN</text>
    <polyline points="660,150 696,136 732,144 768,122 804,130 840,112 876,124 912,108"
              fill="none" stroke="#9CA689" stroke-width="2"/>
    <g>
      <rect x="946" y="146" width="106" height="7" fill="#9CA689" opacity="0.85"/>
      <rect x="946" y="158" width="78"  height="7" fill="#9CA689" opacity="0.7"/>
      <rect x="946" y="170" width="92"  height="7" fill="#F56A6A" opacity="0.85"/>
    </g>
    <text x="660" y="176" font-size="9.5" letter-spacing="1" fill="#9CA689" fill-opacity="0.7">A SENSOR ON EVERY COMPONENT · A LIGHT ON EVERY WAVE</text>
    <!-- sensor wires (dashed) to components + wave-pipe lights -->
    <g stroke="#F9FAFD" stroke-opacity="0.4" stroke-width="1.2" stroke-dasharray="3 5" fill="none">
      <path d="M664,184 C480,300 360,360 271,408"/>
      <path d="M712,184 C520,300 430,380 386,402"/>
      <path d="M812,184 L493,396"/>
      <path d="M690,184 C662,250 632,305 620,311"/>
      <path d="M744,184 C702,330 636,452 620,451"/>
    </g>
    <g fill="#9CA689">
      <circle cx="271" cy="408" r="3.2"/>
      <circle cx="386" cy="402" r="3.2"/>
      <circle cx="493" cy="396" r="3.2"/>
    </g>
  </g>
</svg>
