# tracker-config.yaml — IDC tracker contract (lives at docs/workflow/tracker-config.yaml).
#
# Selects the tracker backend and, for the github backend, pins the project number and
# the five canonical field node IDs.
#
#   backend: github     -> GitHub Projects v2 board. Hard requirements: `backend`,
#                          `project_number`, and `field_ids` with all five names below.
#   backend: filesystem -> a TRACKER.md file at the repo root; no project_number or
#                          field_ids needed. Zero external setup.
#
# The v2 board carries exactly FIVE custom fields (Status, Stage, Wave, Phase, Domain) plus
# native blocked-by links, an `attempt:<n>` label, and claim comments. `Stage`
# (Consideration | Planning | Buildable) is the column-grouping field: upstream pointer items
# ride Consideration/Planning, buildable issues ride Buildable. There is no claim-state /
# lane / track / pillar-trace-key field — an issue is workable cold by any outside agent from
# its body + the plain GitHub API.
#
# Field node IDs are project-specific. After `gh project create`, capture them with a
# GraphQL query over the project's fields and paste the node IDs below. Single-select
# option values are read by NAME at runtime ("In Progress" / "Todo"), so only the five
# field node IDs are persisted here.
#
# Template tokens are quoted to keep this file valid YAML; `/idc:init` substitutes them.

backend: github                                  # github | filesystem
project_number: "{{TRACKER_PROJECT_NUMBER}}"     # integer; from `gh project create`

field_ids:
  Status: ""    # PVTSSF_… single-select (Blocked | Todo | In Progress | Done)
  Stage: ""     # PVTSSF_… single-select (Consideration | Planning | Buildable)
  Wave: ""      # PVTSSF_… single-select (Wave N)
  Phase: ""     # PVTSSF_… single-select (Phase N)
  Domain: ""    # PVTSSF_… single-select

# Optional metadata (loader defaults this when absent).
label_namespace: "idc"
