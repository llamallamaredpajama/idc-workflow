<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="IDC — Iterative Development Cycle. Guardrails, not train tracks.">
  <!-- Coal House palette: coal #252427, canvas #F9FAFD, sage #9CA689, coral #F56A6A -->
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="1280" height="320"/></clipPath>
  </defs>

  <g clip-path="url(#frame)" font-family="Gill Sans, Gill Sans MT, Futura, sans-serif">
    <!-- canvas -->
    <rect width="1280" height="320" fill="#252427"/>

    <!-- oversized roundel watermark bleeding off the right edge (Coal House motif) -->
    <g opacity="0.05">
      <circle cx="1180" cy="160" r="190" fill="none" stroke="#F9FAFD" stroke-width="26"/>
      <rect x="940" y="142" width="480" height="36" fill="#F9FAFD"/>
    </g>

    <!-- industrial inset hairline frame -->
    <rect x="20.5" y="20.5" width="1239" height="279" fill="none" stroke="#9CA689" stroke-opacity="0.35" stroke-width="1"/>

    <!-- ===== transit roundel monogram ===== -->
    <g transform="translate(118,116)">
      <circle cx="0" cy="0" r="60" fill="none" stroke="#F9FAFD" stroke-width="13"/>
      <rect x="-86" y="-15" width="172" height="30" fill="#9CA689"/>
      <text x="0" y="11" text-anchor="middle" font-size="30" font-weight="bold"
            letter-spacing="2" fill="#252427">IDC</text>
    </g>

    <!-- ===== wordmark ===== -->
    <text x="232" y="118" font-size="104" font-weight="bold" letter-spacing="1" fill="#F9FAFD">IDC</text>
    <text x="238" y="156" font-size="21" letter-spacing="7.5" fill="#9CA689">ITERATIVE DEVELOPMENT CYCLE</text>
    <text x="239" y="196" font-size="25" fill="#F9FAFD" fill-opacity="0.66" font-style="italic">guardrails, not train tracks</text>

    <!-- ===== the line: Think — Plan — Build (a transit strip) ===== -->
    <g transform="translate(240,230)">
      <!-- track -->
      <line x1="18" y1="22" x2="724" y2="22" stroke="#9CA689" stroke-width="3"/>
      <!-- ripple: retrograde heal-path (shallow return arc, kept inside the frame) -->
      <path d="M490 31 C 360 70, 150 70, 18 31" fill="none" stroke="#F56A6A"
            stroke-width="2" stroke-dasharray="2 5" opacity="0.85"/>
      <text x="160" y="45" text-anchor="middle" font-size="12.5" letter-spacing="3"
            fill="#F56A6A" opacity="0.95">RIPPLE ↩</text>

      <!-- stations -->
      <g fill="#F9FAFD" font-size="16" font-weight="600" letter-spacing="2.5">
        <circle cx="18" cy="22" r="9" fill="#252427" stroke="#F9FAFD" stroke-width="3.5"/>
        <text x="18" y="-4" text-anchor="middle">THINK</text>

        <circle cx="245" cy="22" r="9" fill="#252427" stroke="#F9FAFD" stroke-width="3.5"/>
        <text x="245" y="-4" text-anchor="middle">PLAN</text>

        <!-- PRD gate: the one stop that can ask -->
        <g>
          <rect x="356" y="11" width="22" height="22" fill="#F56A6A" transform="rotate(45 367 22)"/>
          <text x="367" y="-4" text-anchor="middle" fill="#F56A6A" font-size="12.5" letter-spacing="2">PRD GATE</text>
        </g>

        <circle cx="490" cy="22" r="9" fill="#9CA689" stroke="#F9FAFD" stroke-width="3.5"/>
        <text x="490" y="-4" text-anchor="middle">BUILD</text>

        <!-- terminus arrow: merged, green -->
        <line x1="490" y1="22" x2="712" y2="22" stroke="#9CA689" stroke-width="3"/>
        <path d="M712 22 l-13 -7 l0 14 z" fill="#9CA689"/>
        <text x="640" y="-4" text-anchor="middle" fill="#9CA689" letter-spacing="2">MERGED</text>
      </g>
    </g>

    <!-- footer ticks -->
    <text x="1240" y="290" text-anchor="end" font-size="13" letter-spacing="3"
          fill="#9CA689" fill-opacity="0.85">v2.1.0 · CLAUDE CODE PLUGIN</text>
  </g>
</svg>
