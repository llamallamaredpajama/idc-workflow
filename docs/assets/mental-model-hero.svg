<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1376" height="768" viewBox="0 0 1376 768" role="img"
     aria-label="The IDC water rig — painted blueprint: the Think Tank drains through one inline Diverter #1 (the one gate, with the locked PRD + TRD), two planning grid-plates (domain × phase/wave) and the matrix-analysis filter, the labeled Sequencing Manifold junction fanning into four parallel wave-pipes that each run the build triplet inline (implementer turbine, review filter, finisher turbine) with their own status light at the head, Diverter #2 (ship or return) feeding the Recirculator backflow, the Autorun faucet with its on/off handle pouring into the glass, and the dashboard wired to every component.">
  <!-- Painted base (Gemini blueprint) + native-vector label layer. Coal House palette. -->
  <!-- NOTE (v3): the painted base now depicts the two-diverter / sequencing-manifold / recirculator
       model — single-drain inline gate, two grid-plates, a labeled manifold junction fanning into four
       parallel wave-pipes (status light at the head of each), faucet on/off handle. Regenerated via
       the image-gen skill; this label layer matches it. -->
  <image xlink:href="mental-model-hero-base.png" x="0" y="0" width="1376" height="768"/>

  <g font-family="Gill Sans, Gill Sans MT, Futura, Trebuchet MS, sans-serif">
    <!-- title -->
    <text x="60" y="52" font-size="14" letter-spacing="3" fill="#9CA689">THE IDC WATER RIG</text>
    <text x="60" y="82" font-size="22" font-weight="bold" fill="#F9FAFD">An idea in. Working software out.</text>

    <!-- DASHBOARD -->
    <text x="757" y="58" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1.5" fill="#F9FAFD">THE DASHBOARD — THE BOARD</text>
    <text x="757" y="206" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="#9CA689">STATUS · STAGE · WAVE · PHASE · DOMAIN</text>

    <!-- DIVERTER #1 (inline on the one drain) -->
    <text x="316" y="200" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#F56A6A">DIVERTER #1 — THE ONE GATE</text>
    <text x="316" y="216" text-anchor="middle" font-size="11.5" fill="#F56A6A" fill-opacity="0.95">inline on the one drain · the Think PR</text>
    <text x="316" y="232" text-anchor="middle" font-size="11" fill="#9CA689">PRD + TRD locked — you merge to admit</text>

    <!-- THINK TANK -->
    <text x="131" y="566" text-anchor="middle" font-size="18" font-weight="bold" letter-spacing="2" fill="#F9FAFD">THINK TANK</text>
    <text x="131" y="586" text-anchor="middle" font-size="11.5" fill="#9CA689">/idc:think · ideas → one drain out</text>

    <!-- PLANNING (two grid-plates) -->
    <text x="337" y="348" text-anchor="middle" font-size="13" font-weight="bold" letter-spacing="1" fill="#F9FAFD">PLANNING</text>
    <text x="337" y="364" text-anchor="middle" font-size="10.5" fill="#9CA689">grid-plates · domain × phase/wave</text>

    <!-- MATRIX-ANALYSIS FILTER -->
    <text x="400" y="452" text-anchor="middle" font-size="12" font-weight="bold" letter-spacing="0.5" fill="#F9FAFD">MATRIX-ANALYSIS FILTER</text>
    <text x="400" y="467" text-anchor="middle" font-size="10.5" fill="#9CA689">deconflict → buildable issues</text>

    <!-- SEQUENCING MANIFOLD (the labeled junction at the split) -->
    <text x="495" y="540" text-anchor="middle" font-size="12.5" font-weight="bold" letter-spacing="0.5" fill="#9CA689">SEQUENCING MANIFOLD</text>
    <text x="495" y="555" text-anchor="middle" font-size="10" fill="#9CA689" fill-opacity="0.9">fans the pipe into parallel waves</text>

    <!-- PARALLEL WAVE-PIPES section + build triplet -->
    <text x="770" y="250" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#F9FAFD">PARALLEL WAVE-PIPES — THE BUILD</text>
    <text x="772" y="586" text-anchor="middle" font-size="11" fill="#9CA689">each wave runs the build triplet inline:  ⊙ implementer turbine  →  ▒ review filter  →  ⊙ finisher turbine</text>
    <text x="772" y="601" text-anchor="middle" font-size="11" fill="#9CA689">a status light at the head of every wave — <tspan fill="#F56A6A">red</tspan> / <tspan fill="#9CA689">green</tspan></text>

    <!-- DIVERTER #2 -->
    <text x="1100" y="348" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="0.5" fill="#F56A6A">DIVERTER #2</text>
    <text x="1100" y="364" text-anchor="middle" font-size="11" fill="#F56A6A">ship or return</text>

    <!-- FAUCET + on/off handle -->
    <text x="1212" y="246" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#F9FAFD">FAUCET</text>
    <text x="1212" y="262" text-anchor="middle" font-size="11" fill="#9CA689">/idc:autorun · the ON/OFF handle</text>
    <text x="1212" y="277" text-anchor="middle" font-size="10.5" fill="#9CA689">open it — it flows on its own</text>

    <!-- GLASS -->
    <text x="1259" y="592" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#F9FAFD">THE GLASS</text>
    <text x="1259" y="608" text-anchor="middle" font-size="11" fill="#9CA689">the software you consume</text>

    <!-- RECIRCULATOR -->
    <text x="660" y="706" text-anchor="middle" font-size="13" font-weight="bold" letter-spacing="1" fill="#F56A6A">THE RECIRCULATOR — /idc:recirculate</text>
    <text x="660" y="722" text-anchor="middle" font-size="11" fill="#F56A6A" fill-opacity="0.9">the only way back — all the way to Diverter #1 (re-plan, or up to the PRD + TRD)</text>

    <!-- corner caption -->
    <text x="1340" y="752" text-anchor="end" font-size="11" letter-spacing="2.5" fill="#9CA689" fill-opacity="0.85">ONE-WAY FLOW · ONE GATE · ONE WAY BACK</text>
  </g>
</svg>
