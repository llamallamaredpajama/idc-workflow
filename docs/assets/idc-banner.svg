<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="IDC — Iterative Development Cycle. Guardrails, not train tracks.">
  <!-- Oliver Wyman Forum editorial palette: charcoal #1a1a1a, warm white #f5f4ec, chartreuse accent #c8dc00, warm grey #b3b0a4, signal red #e0524e -->
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="1280" height="320"/></clipPath>
  </defs>

  <g clip-path="url(#frame)" font-family="Gill Sans, Gill Sans MT, Futura, sans-serif">
    <!-- canvas -->
    <rect width="1280" height="320" fill="#1a1a1a"/>

    <!-- oversized roundel watermark bleeding off the right edge -->
    <g opacity="0.05">
      <circle cx="1180" cy="160" r="190" fill="none" stroke="#f5f4ec" stroke-width="26"/>
      <rect x="940" y="142" width="480" height="36" fill="#f5f4ec"/>
    </g>

    <!-- industrial inset hairline frame -->
    <rect x="20.5" y="20.5" width="1239" height="279" fill="none" stroke="#b3b0a4" stroke-opacity="0.35" stroke-width="1"/>

    <!-- ===== transit roundel monogram ===== -->
    <g transform="translate(118,116)">
      <circle cx="0" cy="0" r="60" fill="none" stroke="#f5f4ec" stroke-width="13"/>
      <rect x="-86" y="-15" width="172" height="30" fill="#c8dc00"/>
      <text x="0" y="11" text-anchor="middle" font-size="30" font-weight="bold"
            letter-spacing="2" fill="#1a1a1a">IDC</text>
    </g>

    <!-- ===== wordmark ===== -->
    <text x="232" y="118" font-size="104" font-weight="bold" letter-spacing="1" fill="#f5f4ec">IDC</text>
    <text x="238" y="156" font-size="21" letter-spacing="7.5" fill="#b3b0a4">ITERATIVE DEVELOPMENT CYCLE</text>
    <text x="239" y="196" font-size="25" fill="#f5f4ec" fill-opacity="0.66" font-style="italic">guardrails, not train tracks</text>

    <!-- ===== the line: Think — Plan — Build (a transit strip) ===== -->
    <g transform="translate(240,230)">
      <!-- track -->
      <line x1="18" y1="22" x2="724" y2="22" stroke="#c8dc00" stroke-width="3"/>
      <!-- recirculator: retrograde heal-path returning to the gate at the end of Think -->
      <path d="M490 31 C 360 72, 245 72, 135 31" fill="none" stroke="#e0524e"
            stroke-width="2" stroke-dasharray="2 5" opacity="0.85"/>
      <text x="312" y="52" text-anchor="middle" font-size="12.5" letter-spacing="3"
            fill="#e0524e" opacity="0.95">RECIRCULATE ↩</text>

      <!-- stations -->
      <g fill="#f5f4ec" font-size="16" font-weight="600" letter-spacing="2.5">
        <circle cx="18" cy="22" r="9" fill="#1a1a1a" stroke="#f5f4ec" stroke-width="3.5"/>
        <text x="18" y="-4" text-anchor="middle">THINK</text>

        <circle cx="245" cy="22" r="9" fill="#1a1a1a" stroke="#f5f4ec" stroke-width="3.5"/>
        <text x="245" y="-4" text-anchor="middle">PLAN</text>

        <!-- the one gate: at the END of Think — admits the PRD + TRD (the Think PR) -->
        <g>
          <rect x="124" y="11" width="22" height="22" fill="#c8dc00" transform="rotate(45 135 22)"/>
          <text x="135" y="-4" text-anchor="middle" fill="#c8dc00" font-size="12.5" letter-spacing="2">GATE · PRD+TRD</text>
        </g>

        <circle cx="490" cy="22" r="9" fill="#c8dc00" stroke="#f5f4ec" stroke-width="3.5"/>
        <text x="490" y="-4" text-anchor="middle">BUILD</text>

        <!-- terminus arrow: merged -->
        <line x1="490" y1="22" x2="712" y2="22" stroke="#c8dc00" stroke-width="3"/>
        <path d="M712 22 l-13 -7 l0 14 z" fill="#c8dc00"/>
        <text x="640" y="-4" text-anchor="middle" fill="#c8dc00" letter-spacing="2">MERGED</text>
      </g>
    </g>

    <!-- footer ticks -->
    <text x="1240" y="290" text-anchor="end" font-size="13" letter-spacing="3"
          fill="#b3b0a4" fill-opacity="0.85">v3.0.0 · CLAUDE CODE PLUGIN</text>
  </g>
</svg>
