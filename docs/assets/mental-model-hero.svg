<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1376" height="768" viewBox="0 0 1376 768" role="img"
     aria-label="The IDC water rig — painted blueprint: Think Tank, Planning turbine, the Diverter Valve (one gate) branching up to the locked PRD, Implementer turbine, Filter, Finisher turbine, the Bleed Valve backflow, the Autorun faucet pouring into the glass, and the dashboard wired to every turbine.">
  <!-- Painted base (Gemini blueprint) + native-vector label layer. Coal House palette. -->
  <image xlink:href="mental-model-hero-base.png" x="0" y="0" width="1376" height="768"/>

  <g font-family="Gill Sans, Gill Sans MT, Futura, Trebuchet MS, sans-serif">
    <!-- leader lines + sensor dots -->
    <g stroke="#F9FAFD" stroke-opacity="0.5" stroke-width="1.2" fill="none">
      <line x1="405" y1="326" x2="405" y2="352"/>
      <line x1="585" y1="332" x2="556" y2="378"/>
      <line x1="498" y1="198" x2="520" y2="210"/>
      <line x1="1085" y1="346" x2="1085" y2="388"/>
      <line x1="1230" y1="158" x2="1216" y2="248"/>
    </g>

    <!-- title -->
    <text x="60" y="52" font-size="14" letter-spacing="3" fill="#9CA689">THE IDC WATER RIG</text>
    <text x="60" y="82" font-size="22" font-weight="bold" fill="#F9FAFD">An idea in. Working software out.</text>

    <!-- THINK TANK -->
    <text x="185" y="668" text-anchor="middle" font-size="19" font-weight="bold" letter-spacing="1.5" fill="#F9FAFD">THINK TANK</text>
    <text x="185" y="689" text-anchor="middle" font-size="12.5" fill="#9CA689">/idc:think · ideas → one consideration</text>

    <!-- PLANNING TURBINE -->
    <text x="405" y="302" text-anchor="middle" font-size="15" font-weight="bold" letter-spacing="1" fill="#F9FAFD">PLANNING TURBINE</text>
    <text x="405" y="320" text-anchor="middle" font-size="11.5" fill="#9CA689">/idc:plan</text>

    <!-- PRD (locked tank) -->
    <text x="492" y="178" text-anchor="end" font-size="17" font-weight="bold" letter-spacing="1" fill="#F9FAFD">PRD</text>
    <text x="492" y="197" text-anchor="end" font-size="12" font-weight="bold" fill="#F56A6A">you authorize</text>
    <text x="492" y="213" text-anchor="end" font-size="10.5" fill="#9CA689">the one valve only you open</text>

    <!-- DIVERTER VALVE -->
    <text x="600" y="322" font-size="15" font-weight="bold" letter-spacing="1" fill="#F56A6A">DIVERTER VALVE</text>
    <text x="600" y="340" font-size="11.5" fill="#9CA689">the one gate</text>

    <!-- DASHBOARD -->
    <text x="966" y="138" font-size="14" font-weight="bold" letter-spacing="1" fill="#F9FAFD">THE DASHBOARD</text>
    <text x="966" y="156" font-size="11" fill="#9CA689">the board · a sensor</text>
    <text x="966" y="170" font-size="11" fill="#9CA689">on every turbine</text>
    <text x="812" y="284" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="#9CA689">STATUS · STAGE · WAVE · PHASE · DOMAIN</text>

    <!-- BLEED VALVE -->
    <text x="1085" y="320" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#F56A6A">BLEED VALVE</text>
    <text x="1085" y="338" text-anchor="middle" font-size="11.5" fill="#9CA689">/idc:ripple</text>

    <!-- build triplet (below the backflow) -->
    <text x="665" y="702" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="0.5" fill="#F9FAFD">IMPLEMENTER</text>
    <text x="665" y="719" text-anchor="middle" font-size="11" fill="#9CA689">the engine · TDD loop</text>
    <text x="845" y="702" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="0.5" fill="#F9FAFD">FILTER</text>
    <text x="845" y="719" text-anchor="middle" font-size="11" fill="#9CA689">review · tests · e2e · visual</text>
    <text x="985" y="702" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="0.5" fill="#F9FAFD">FINISHER</text>
    <text x="985" y="719" text-anchor="middle" font-size="11" fill="#9CA689">the caboose · fix → merge</text>

    <!-- backflow caption -->
    <text x="760" y="652" text-anchor="middle" font-size="12" font-weight="bold" letter-spacing="0.5" fill="#F56A6A">CONTROLLED BACKFLOW — the only way back, re-decided at the gate</text>

    <!-- FAUCET -->
    <text x="1230" y="116" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#F9FAFD">FAUCET</text>
    <text x="1230" y="134" text-anchor="middle" font-size="11.5" fill="#9CA689">/idc:autorun</text>
    <text x="1230" y="149" text-anchor="middle" font-size="10.5" fill="#9CA689">open it — it flows on its own</text>

    <!-- GLASS -->
    <text x="1232" y="652" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#F9FAFD">THE GLASS</text>
    <text x="1232" y="670" text-anchor="middle" font-size="11" fill="#9CA689">the software you consume</text>

    <!-- corner caption -->
    <text x="1340" y="744" text-anchor="end" font-size="11" letter-spacing="2.5" fill="#9CA689" fill-opacity="0.85">ONE-WAY FLOW · ONE GATE · ONE WAY BACK</text>
  </g>
</svg>
