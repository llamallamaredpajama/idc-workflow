# workflow-machine.yaml — the IDC workflow state machine, AS DATA (v4 Phase 2, plan §3.1).
#
# This file is the legal-transition table the transition engine (scripts/idc_transition.py)
# enforces. /idc:init and /idc:update scaffold it into a governed repo at
# docs/workflow/workflow-machine.yaml (where the engine's machine_path_for prefers it); this bundled
# copy is the pre-scaffold fallback. Editing a workflow rule = editing THIS data, not the engine
# code — the engine is a generic interpreter.
#
# Model:
#   * A board item's state is a (Stage x Status) pair. Both fields are ALWAYS set together — an
#     item with a Stage but no Status is illegal (the #255/#256 bug class); the engine normalizes
#     every op so that shape can never be written.
#   * `ops:` is the full set of typed operations the engine's single write door accepts. Any op
#     not listed here is refused (an "illegal transition"). Each op declares:
#       kind        — create | transition | terminal | link
#       target      — {stage, status} for create ops (the initial legal state)
#       to_status   — the Status a transition/terminal op moves an item to ("any" = any legal Status)
#       from_status — a transition is refused unless the item's CURRENT Status is one of these
#                     (e.g. `unblock` only lifts a Blocked item — it can never resurrect a Done one).
#       records_agent — true if a --agent passed to this op is recorded as an ownership comment
#                     (never silently dropped). DATA-driven, so the engine has no op-name special case.
#       guards      — for a TERMINAL op: the receipts the engine verifies (against on-disk artifacts,
#                     not prose) before Done. An EMPTY guard list on a terminal op is FAIL-CLOSED —
#                     see the terminal invariant below (a verdict-free path to Done is forbidden).
#                     Non-terminal ops declare no guards (they are bounded by validate_target instead).
#
# THE terminal invariant (the crown-jewel rule the engine enforces):
#   `Done` is reachable ONLY through a GUARDED terminal op whose deterministic evidence guard passes.
#   Two doors, no others:
#     * `close`   — for BUILT work: its verdict must be VALID, PASSING, and OWN the item (verdict.issue
#                   == the closing item, verdict.pr == the mandatory --pr).
#     * `dispose` — for a NON-verdict terminal disposition (an approved operator gate, a decomposed
#                   pointer, a drained recirc-inbox item): it mints Done only when the named
#                   `--disposition`'s per-disposition evidence guard passes (see `ops.dispose` below).
#   NOTHING else reaches Done — create/move/claim/unblock/recirculate-intake are refused from minting
#   it, and a terminal op that resolves to NO guards (a hand-authored `guards: []` op, or a `dispose`
#   with a missing/unknown disposition) is FAIL-CLOSED. Every other write is bounded by the declared
#   domains via one `validate_target` gate.
#   (One disclosed NON-door exists outside the engine: the janitor's `--apply-safe` RECONCILER may
#   stamp Done when the truth already happened elsewhere — the issue completed on GitHub / the IDC
#   build branch merged clean — but it DECIDES nothing, and it journals its repair as its own
#   `janitor-repair` record carrying that verified truth, never as an engine `close`/`dispose`, so
#   the audit trail can always tell a reconciliation from a guarded close.)
#
# Two more machine-level invariants the engine enforces for EVERY write (create AND transition), so
# there is no second path around a per-op rule:
#   worked_status + worked_forbidden_stages — the "worked" Status (an item actively being built) is
#     ILLEGAL on the listed non-build Stages (pointers/inbox are never worked). ANY op that would
#     drive OR mint an item at worked_status on one of those Stages is refused — `claim`, `move`, AND
#     a direct `create --stage Recirculation --status "In Progress"`, uniformly.
#   terminal_status (transition side) — a terminal (Done) item is NOT transitionable: no op resurrects it.
#
# Guards (evaluated by the engine, each names an on-disk/board artifact it checks):
#   verdict-validated     — a review verdict JSON that passes idc_review_verdict_check.py exists, is
#                           PASSING, and OWNS the item/PR (the close receipt; #394ec6fe drop A/B/C).
#   merge-conditions-met  — every entry in that verdict's merge_conditions[] is marked met (closes
#                           the silently-downgraded pre-merge-condition failure, #246 -> #248).
#   The `dispose` op's per-disposition evidence guards (deterministic, board/disk-checkable, SAME
#   guard code on both backends; a board-read failure fails closed / resumable, never a bad close):
#   gate-approval-artifact       — the item is an `[operator-action]` gate (by title prefix) AND the
#                                  backend's real approval artifact is present, BOUND to this gate:
#                                  github = the gate's OWN recorded `idc-gate-pr` approval PR is
#                                  merged, or — only on an operator-DECISION gate, whose KIND is the
#                                  producer-stamped `[operator-action] Decision — …` TITLE (labels
#                                  never retype a gate) — the decision/decision-approved label pair;
#                                  filesystem = the operator's own explicit Done-move via this op (the
#                                  PR #73 gate-item semantics — no PRs/labels exist), the gate marker
#                                  confining it to a genuine gate so it is never a verdict-free
#                                  backdoor for build work.
#   pointer-decomposition-record — the item is a Stage=Consideration (or legitimately advanced
#                                  Planning) pointer AND a named `--child` on the board REFERENCES it
#                                  through the engine's own kind=sub DECOMPOSITION link (child.parent
#                                  == pointer on filesystem; a kind=sub idc-blocked-by marker or the
#                                  native `Tracked by:#<pointer>` line on github — a blocks-edge is a
#                                  dependency, never a decomposition), AND — above the journal
#                                  adoption watermark — the engine's JOURNALED kind=sub link record
#                                  corroborates that board relation (board links alone are
#                                  adapter-forgeable, #151; a kind-less journal record predates kind
#                                  journaling and is tolerated).
#   recirc-provenance            — the item is on Stage=Recirculation AND carries the `idc-recirc-source`
#                                  provenance marker the filer/sweep stamp onto every recirc-inbox ticket,
#                                  AND — above the journal adoption watermark — a corroborating journal
#                                  record proves a sanctioned door staged it (the sweep's re-stage or
#                                  the engine's intake; markers alone are adapter-forgeable, #151).

version: 1

# The canonical field domains — mirror scripts/idc_tracker_fs.py STATUSES/STAGES. The engine
# cross-checks these against the backend at load time (idc_transition.validate_machine) and REFUSES
# to run on a drift, so the two can never silently diverge.
statuses: [Blocked, Todo, In Progress, Done]
stages: [Consideration, Planning, Buildable, Recirculation]
terminal_status: Done

# The "worked" Status is illegal on these non-build Stages (a Recirculation inbox item is drained by
# /idc:recirculate, a Consideration pointer is decomposed by Plan — neither is ever built). Enforced
# for EVERY transition op, so `move` cannot reach a worked state that `claim` forbids.
worked_status: In Progress
worked_forbidden_stages: [Recirculation, Consideration]

ops:
  # ── create ops: mint a new item at a legal initial (Stage x Status) ──────────────────────────
  # (a --status/--stage override is bounded by validate_target: within the declared domains,
  #  normalized, NON-terminal — create can never mint Done — and not a forbidden worked state.)
  create-ticket:
    kind: create
    target: {stage: Buildable, status: Todo}
  create-pointer:
    kind: create
    target: {stage: Consideration, status: Todo}
  recirculate-intake:
    kind: create
    target: {stage: Recirculation, status: Todo}

  # ── transition ops: move an existing item's Status ───────────────────────────────────────────
  # (no transition may mint Done or reach a worked state on a non-build Stage, and none touches a
  #  terminal Done item — all enforced engine-wide, not per-op.)
  claim:
    kind: transition
    to_status: In Progress
    records_agent: true
  move:
    kind: transition
    to_status: any
  unblock:
    kind: transition
    to_status: Todo
    from_status: [Blocked]

  # ── terminal ops: the ONLY path to Done ──────────────────────────────────────────────────────
  # `close` is the sole guarded path to a terminal Status — its verdict must be valid, PASSING, and
  # OWN the item/PR (see the terminal invariant above).
  close:
    kind: terminal
    to_status: Done
    guards: [verdict-validated, merge-conditions-met]
  # `dispose` closes a NON-build item that has no review verdict — an approved operator gate, a
  # decomposed Consideration pointer, or a drained Recirculation-inbox item (#150 door unification).
  # The board Status enum has only ONE terminal value (Done) — no new board Status — so `dispose`
  # mints that SAME Done, but ONLY when the caller's `--disposition` names one of the entries below
  # AND that disposition's per-disposition evidence guard passes. A `dispose` with a missing/unknown
  # disposition resolves to NO guards and is FAIL-CLOSED (the guard-free terminal invariant). Every
  # disposition close journals which door + disposition + evidence.
  dispose:
    kind: terminal
    to_status: Done
    dispositions:
      gate-approved:
        guards: [gate-approval-artifact]
      retired:
        guards: [pointer-decomposition-record]
      drained:
        guards: [recirc-provenance]

  # ── structural ops ───────────────────────────────────────────────────────────────────────────
  link:
    kind: link
